title: TinyCAD Manual
description: User and developer documentation for TinyCAD
theme: minima
markdown: kramdown
permalink: pretty
github_edit_base_url: https://github.com/matt123p/TinyCAD-docs/blob/main

plugins:
  - jekyll-feed
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default