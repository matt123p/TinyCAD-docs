{%- assign figure_classes = 'manual-media-figure manual-video-player' -%}
{%- if include.class -%}
  {%- assign figure_classes = figure_classes | append: ' ' | append: include.class -%}
{%- endif -%}
<figure class="{{ figure_classes }}"{% if include.width %} style="width: {{ include.width }}px; max-width: 100%;"{% endif %}>
  <video class="manual-video" controls preload="{{ include.preload | default: 'metadata' }}" playsinline{% if include.width %} width="{{ include.width }}"{% endif %}{% if include.height %} height="{{ include.height }}"{% endif %}>
    <source src="{{ include.src }}" type="{{ include.type | default: 'video/mp4' }}" />
    Your browser does not support the video tag. You can <a href="{{ include.src }}">open the video directly</a>.
  </video>
  <div class="manual-video-controls" aria-label="{{ include.controls_label | default: 'Video playback controls' }}">
    <button type="button" class="manual-video-button manual-video-button-toggle" data-action="toggle" aria-label="Play video" title="Play video">
      <i class="bi bi-play-fill" data-role="toggle-icon" aria-hidden="true"></i>
      <span class="manual-video-sr-only" data-role="toggle-label">Play</span>
    </button>
    <button type="button" class="manual-video-button" data-action="restart" aria-label="Restart video" title="Restart video">
      <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i>
      <span class="manual-video-sr-only">Restart</span>
    </button>
    <label class="manual-video-scrubber-label">
      <span class="manual-video-sr-only">Video position</span>
      <input class="manual-video-scrubber" type="range" min="0" max="100" value="0" step="0.1" data-role="scrubber" />
    </label>
    <output class="manual-video-time" data-role="time">0:00 / 0:00</output>
  </div>
  {%- if include.caption -%}
    <figcaption>{{ include.caption }}</figcaption>
  {%- endif -%}
</figure>
